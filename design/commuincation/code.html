<header class="mb-12 relative">
<div class="absolute -top-8 -left-8 opacity-20 transform -rotate-12">
<span class="material-symbols-outlined text-8xl text-primary">auto_awesome</span>
</div>
<h1 class="font-headline text-5xl md:text-6xl font-bold text-on-background mb-4">
                What's on your <span class="italic text-primary">mind?</span>
</h1>
<div class="flex items-center gap-4">
<p class="font-handwritten text-2xl text-tertiary">Tap a card to speak!</p>
<div class="animate-bounce">
<span class="material-symbols-outlined text-primary">arrow_downward</span>
</div>
</div>
</header>
<!-- Communication Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-8">
<!-- Card 1: Happy -->
<button class="tap-scale group bg-surface rounded-xl p-10 flex flex-col items-center justify-center text-center card-shadow relative overflow-hidden h-80 transition-all">
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary-container/30 rounded-full -mr-16 -mt-16 group-hover:scale-110 transition-transform"></div>
<div class="text-[5rem] mb-6"><span class="material-symbols-outlined text-[6rem] text-primary/80" style="font-variation-settings: 'FILL' 1, 'wght' 300">sunny</span></div>
<h3 class="font-brand text-3xl text-on-surface mb-4">I'm Happy</h3>
<span class="bg-primary-container text-primary font-bold px-4 py-1 rounded-full text-xs tracking-wider uppercase flex items-center gap-2">
<span class="material-symbols-outlined text-sm">volume_up</span> tap to say
                </span>
</button>
<!-- Card 2: Hungry -->
<button class="tap-scale group bg-surface rounded-xl p-10 flex flex-col items-center justify-center text-center card-shadow relative overflow-hidden h-80 transition-all">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/30 rounded-full -mr-16 -mt-16 group-hover:scale-110 transition-transform"></div>
<div class="text-[5rem] mb-6"><span class="material-symbols-outlined text-[6rem] text-secondary/80" style="font-variation-settings: 'FILL' 1, 'wght' 300">restaurant</span></div>

<span class="bg-primary-container text-primary font-bold px-4 py-1 rounded-full text-xs tracking-wider uppercase flex items-center gap-2">
<span class="material-symbols-outlined text-sm">volume_up</span> tap to say
                </span>
</button>
<!-- Card 3: Thirsty -->
<button class="tap-scale group bg-surface rounded-xl p-10 flex flex-col items-center justify-center text-center card-shadow relative overflow-hidden h-80 transition-all">
<div class="absolute top-0 right-0 w-32 h-32 bg-tertiary-container/30 rounded-full -mr-16 -mt-16 group-hover:scale-110 transition-transform"></div>
<div class="text-[5rem] mb-6"><span class="material-symbols-outlined text-[6rem] text-tertiary/80" style="font-variation-settings: 'FILL' 1, 'wght' 300">local_drink</span></div>

<span class="bg-primary-container text-primary font-bold px-4 py-1 rounded-full text-xs tracking-wider uppercase flex items-center gap-2">
<span class="material-symbols-outlined text-sm">volume_up</span> tap to say
                </span>

<div class="text-[5rem] mb-6"><span class="material-symbols-outlined text-[6rem] text-slate-400" style="font-variation-settings: 'FILL' 1, 'wght' 300">rainy</span></div>
